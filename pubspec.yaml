name: kadan_kanakku_pro
description: Daily interest loan tracking app for small lenders (Kadan Kanakku Pro).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.5
  firebase_messaging: ^14.7.19

  # State management
  provider: ^6.1.2

  # UI
  google_fonts: ^6.2.1
  intl: ^0.19.0
  fl_chart: ^0.67.0
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0

  # Utils
  pin_code_fields: ^8.0.1
  uuid: ^4.3.3
  shared_preferences: ^2.2.2
  connectivity_plus: ^6.0.1

  # PDF & Excel export
  pdf: ^3.10.8
  printing: ^5.12.0
  excel: ^4.0.2
  path_provider: ^2.1.2
  share_plus: ^7.2.2

  # Local notifications
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  fonts:
    - family: NotoSansTamil
      fonts:
        - asset: assets/fonts/NotoSansTamil-Regular.ttf
        - asset: assets/fonts/NotoSansTamil-Bold.ttf
          weight: 700
  assets:
    - assets/images/
    - assets/lang/
